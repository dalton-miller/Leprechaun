name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Download rclone
        run: make download-rclone

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build --configuration release

      - name: Verify app runs
        run: swift run Leprechaun --help 2>&1 || true

      - name: Verify release bundle
        run: |
          ./package.sh
          test -f .build/release/Leprechaun.app/Contents/MacOS/Leprechaun
          test -f .build/release/Leprechaun.app/Contents/Resources/rclone-darwin-arm64
          test -f .build/release/Leprechaun-*.dmg
          echo "✓ Release package validated"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Leprechaun-dmg
          path: .build/release/Leprechaun-*.dmg
          retention-days: 5
