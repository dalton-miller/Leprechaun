<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: rounded square -->
  <rect x="40" y="40" width="944" height="944" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Shield / backup icon -->
  <g transform="translate(512,512) scale(0.8)">
    <!-- Shield body -->
    <path d="M0,-200 L160,-140 L160,60 C160,160 80,240 0,280 C-80,240 -160,160 -160,60 L-160,-140 Z"
          fill="url(#shield)" stroke="#fff" stroke-width="12" stroke-linejoin="round"/>

    <!-- Arrow circling (sync arrow) -->
    <path d="M-120,-20 A140,140 0 0,1 100,-60" fill="none" stroke="#fff" stroke-width="28"
          stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M70,-90 L110,-55 L80,-30" fill="none" stroke="#fff" stroke-width="28"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle top highlight -->
  <ellipse cx="512" cy="140" rx="380" ry="60" fill="rgba(255,255,255,0.08)"/>

  <defs>
    <!-- Background gradient: emerald green -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <!-- Shield gradient: lighter emerald -->
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
</svg>
