<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS style rounded background -->
  <rect width="512" height="512" rx="110" fill="#15803d"/>

  <!-- Clover Group -->
  <g transform="translate(256, 253)">
    <!-- Leaf Template: A narrower teardrop shape -->
    <defs>
      <path id="leaf" d="M0 0 C -30 -20 -35 -75 0 -80 C 35 -75 30 -20 0 0" />
    </defs>

    <!-- Leaves (drawn first so they are behind the stem) -->
    <!-- Top Leaf -->
    <use href="#leaf" transform="rotate(-90)" fill="#ffffff" />

    <!-- Bottom Right Leaf -->
    <use href="#leaf" transform="rotate(30)" fill="#ffffff" fill-opacity="0.9" />

    <!-- Bottom Left Leaf -->
    <use href="#leaf" transform="rotate(150)" fill="#ffffff" fill-opacity="0.9" />

    <!-- The Stem (drawn last to cover the leaf junctions) -->
    <path d="M0 -5 Q -8 40 0 85 Q 8 40 0 -5" fill="#ffffff" />
  </g>
</svg>
